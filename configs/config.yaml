pipeline:
  dataset_path: "dataset/emails.json"
  results_dir: "results"
  max_emails: 50
  batch_size: 5

evaluation:
  confidence_threshold: 0.7
  human_review_threshold: 0.5
  embedding_model: "all-MiniLM-L6-v2"

generation:
  provider: "nvidia"
  model: "meta/llama-3.1-8b-instruct"
  temperature: 0.3
  max_tokens: 512

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
